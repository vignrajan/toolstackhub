<!DOCTYPE html>
<!-- 
  OG Image Template (1200x630)
  Convert to PNG using: puppeteer, playwright, or https://og-image.vercel.app
  Place the result as /public/og-image.png
-->
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
    font-family: system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: rgba(99,102,241,0.3);
    filter: blur(100px);
  }
  .glow-1 { top: -100px; left: -100px; }
  .glow-2 { bottom: -100px; right: -100px; background: rgba(139,92,246,0.2); }
  .content { position: relative; z-index: 1; text-align: center; color: white; }
  .logo {
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .logo-icon {
    width: 56px; height: 56px; background: rgba(255,255,255,0.15);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; border: 1px solid rgba(255,255,255,0.2);
  }
  .logo-text { font-size: 32px; font-weight: 700; }
  .logo-text span { color: #a5b4fc; }
  h1 { font-size: 64px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
  h1 em { font-style: normal; color: #a5b4fc; }
  p { font-size: 24px; color: rgba(255,255,255,0.6); margin-bottom: 32px; }
  .pills { display: flex; gap: 12px; justify-content: center; }
  .pill {
    padding: 8px 20px; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 100px;
    font-size: 16px; color: rgba(255,255,255,0.8);
  }
</style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="content">
    <div class="logo">
      <div class="logo-icon">T</div>
      <div class="logo-text">Tool<span>Stack</span>Hub</div>
    </div>
    <h1>Free Online Tools<br>for <em>Everyone</em></h1>
    <p>15+ tools · No signup · 100% browser-based</p>
    <div class="pills">
      <div class="pill">🗜️ Image Tools</div>
      <div class="pill">💻 Developer Tools</div>
      <div class="pill">🛠️ Utilities</div>
    </div>
  </div>
</body>
</html>
